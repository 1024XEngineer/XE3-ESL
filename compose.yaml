services:
  postgres:
    image: postgres:18.4-bookworm@sha256:1961f96e6029a02c3812d7cb329a3b03a3ac2bb067058dec17b0f5596aca9296
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xe3_esl}
      POSTGRES_USER: ${POSTGRES_USER:-xe3_esl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready --username="$${POSTGRES_USER}" --dbname="$${POSTGRES_DB}"',
        ]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres-data:
